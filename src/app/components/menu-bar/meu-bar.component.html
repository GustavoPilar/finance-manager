<p-menubar [model]="items">
  <ng-template #start>
     <img [src]="'assets/image/logo/' + logoUrl" width="30" height="30" alt="logo" (click)="navigateToHome()">
  </ng-template>
  <ng-template #end>
    <div class="w-full cursor-pointer" (click)="openSettings()">
      <p-avatar icon="pi pi-user"></p-avatar>
    </div>
  </ng-template>
</p-menubar>
