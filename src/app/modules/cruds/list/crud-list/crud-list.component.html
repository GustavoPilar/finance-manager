<p-toast></p-toast>
<p-confirm-dialog></p-confirm-dialog>

@if (crudBaseComponent && crudBaseComponent.crudManagerService) {

  <app-header
    [title]="crudBaseComponent.getTypeDescription().plural"
    [icon]="crudBaseComponent.icon"
    size="2xl"
    buttonIcon="pi pi-plus"
    (buttonCommand)="newEntity()"
    [showButton]="!crudBaseComponent.isOnlyRead || !crudBaseComponent.entities.length">
  </app-header>

  @if (!crudBaseComponent.entities.length) {
    <div class="fluid max-w-80rem p-2 shadow-3 border-round my-3">
      <div class="w-full flex justify-content-between align-items-center">
        <p class="">Nenhum registro encontrado.</p>
        <div class="flex justify-content-between align-items-center p-2 gap-2">
          <p-button icon="pi pi-plus" severity="contrast" size="small" rounded (onClick)="newEntity()"></p-button>
        </div>
      </div>
    </div>
  }

  <div class="w-full p-2 my-2">
      @for (entity of crudBaseComponent.entities; track $index) {
        <app-card-list
        [entity]="entity"
        [displayColumns]="crudBaseComponent.getDisplayColumn()"
        (editCommand)="editEntity(entity)"
        (deleteCommand)="confirmDelete(entity)"></app-card-list>
      }
  </div>
}
