<div class="w-full p-2">
  <div class="w-full flex justify-content-evenly align-items-center">
    <h2>
      @if (iconPos == "left") {
        <i [class]="icon + ' mx-3 text-' + iconSize"></i>
      }

      <span class="uppercase mx-1">{{title}}</span>

      @if (iconPos == "right") {
        <i [class]="icon + ' mx-3 text-' + iconSize"></i>
      }
    </h2>
  </div>
  <div class="w-full text-center my-3 max-w-80rem m-auto">
    <p class="p-2">{{description}}</p>
  </div>
</div>
