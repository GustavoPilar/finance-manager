@if (isForm && entityForm) {
  <form [formGroup]="entityForm" class="p-2">
    <div class="grid">
      <div class="field col-12 md:col-6">
        <label for="description">Descrição:</label>
        <input type="text" pInputText id="description" formControlName="description" placeholder="Digite a descrição da categoria" fluid>
      </div>
      <div class="field col-6 md:col-4">
        <div class="flex items-center gap-2">
          <p-colorpicker formControlName="color" inputId="cp-hex" />
          <span>Cor: <span [style]="{'color' : entityForm.get('color')?.value}">{{ entityForm.get("color")?.value }}</span></span>
        </div>
      </div>
      <div class="field col-6 md:col-4">
        <div class="flex items-center gap-2">
          <p-checkbox [binary]="true" formControlName="isActive" inputId="isActive"></p-checkbox>
          <label for="isActive">Categoria ativa?</label>
        </div>
      </div>
    </div>
  </form>
}
