<div class="field col-10 md:col-5 lg:col-3 shadow-2 border-round m-auto mb-4">

  <div class="w-full p-2 flex justify-content-between align-items-center mb-1">
    <p class="text-2xl">{{entity.name}}</p>
    <div class="flex justify-content-between align-items-center p-2 gap-2">
      <p-button icon="pi pi-pencil" severity="contrast" size="small" rounded (onClick)="editEntityEmitter()"></p-button>
      <p-button icon="pi pi-trash" severity="danger" size="small" rounded (onClick)="deleteEntityEmitter()" [disabled]="isReadOnly"></p-button>
    </div>
  </div>

  <div class="w-full bg-gray-200 p-2 line-height-4 border-round mb-1">

    @for (column of displayColumns; track $index) {
      <p>
        {{column.description}}:

        @if (isBooleanColumn(column)) {
          <p-tag [severity]="entity[column.field] == true ? 'success' : 'danger'" [icon]="entity[column.field] == true ? 'pi pi-check' : 'pi pi-times'">
            {{getColumnValue(entity, column)}}
          </p-tag>
        }
        @else {
          <span class="font-bold">{{getColumnValue(entity, column)}}</span>
        }
      </p>
    }
  </div>

</div>
