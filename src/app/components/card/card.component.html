<p-card>
  <ng-template #title>
    <div class="w-full flex justify-content-between align-items-center">
      {{titleCard}}
      <i [class]="icon"></i>
    </div>
    <p-divider></p-divider>
  </ng-template>
  <ng-template #content>
    <div class="w-full p-2 bg-primary-800 border-round">
      {{description}}
    </div>
  </ng-template>
  <ng-template #footer>
    <div class="w-full text-right mt-4">
      <p-button rounded icon="pi pi-arrow-right" severity="contrast" (onClick)="command()"></p-button>
    </div>
  </ng-template>
</p-card>
