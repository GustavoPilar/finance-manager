<div class="grid">
  @for (item of items; track $index) {
    <div class="field col-10 offset-col-1 m-auto my-2 h-11rem border-round bg-gray-100 shadow-2" (click)="navigateTo(item.routerLink)">
      <div class="w-full h-full border-round relative">
        <!-- Start Title -->
        <div class="w-full flex justify-content-between align-items-center p-2">
          <p class="font-bold text-lg">
            {{item.label}}
          </p>
          <i [class]="item.icon + ' text-3xl'"></i>
        </div>
        <!-- End Title -->
        <!-- Start Button -->
        <div class="absolute bottom-0 right-0 w-full text-right p-2">
          <p-button fluid label="acessar" (onClick)="navigateTo(item.routerLink)"></p-button>
        </div>
        <!-- End Button -->
      </div>
    </div>
  }
</div>
